<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRINC DFR · Ultimate Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg: #000; --bg2: #080808; --border: #1e1e1e; --border2: #2a2a2a;
  --accent: #00D2FF; --gold: #FFD700; --green: #39FF14; --red: #FF3B3B;
  --text: #fff; --muted2: #888; --card: #0a0a0a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,210,255,0.012) 39px, rgba(0,210,255,0.012) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(0,210,255,0.012) 79px, rgba(0,210,255,0.012) 80px);
}
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }

header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--accent); }

.drop-zone { border: 1.5px dashed var(--border2); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; background: var(--bg2); margin-bottom: 24px; position: relative; }
.drop-zone:hover { border-color: var(--accent); background: rgba(0,210,255,0.04); }
.file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
.shift-btn { background: #111; border: 1px solid #333; color: var(--muted2); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; }
.shift-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.btn-generate { margin-left: auto; background: var(--accent); border: none; font-weight: 800; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

.dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-bottom: 24px; }
.kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; border-top: 3px solid var(--accent); }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 1.3rem; color: var(--accent); font-weight: 700; display: block; }
.kpi-lbl { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: var(--muted2); margin-top: 2px; }

.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 15px; }
.chart-title { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--muted2); margin-bottom: 12px; letter-spacing: 1px; }

#pocketMap { height: 400px; width: 100%; border-radius: 8px; background: #000; border: 1px solid var(--border); }
.leaflet-container { background: #000 !important; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.scroll-table { max-height: 250px; overflow-y: auto; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.sched-table th { text-align: left; padding: 8px; color: var(--muted2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; text-transform: uppercase; }
.sched-table td { padding: 8px; border-bottom: 1px solid var(--border); }

/* Calendar */
.calendar-grid { display: flex; flex-wrap: wrap; gap: 15px; }
.cal-month { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; min-width: 250px; flex: 1; }
.cal-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent); margin-bottom: 10px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day { aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; border: 1px solid transparent; }
.lvl-0 { background: rgba(255,255,255,0.03); color: #444; }
.lvl-1 { background: rgba(0,210,255,0.1); color: var(--accent); }
.lvl-4 { background: rgba(255,59,59,0.3); color: var(--red); border: 1px solid var(--red); }

.hidden { display: none !important; }
.status-bar { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-bottom: 15px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">BRINC <span>·</span> DFR</div>
    <div class="header-tag">DFR WORKFORCE PLANNING</div>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" class="file-input" id="fileInput" accept=".csv, .xlsx, .xls">
    <div style="font-size:1.5rem; margin-bottom:8px;">📁</div>
    <div style="font-weight:800; font-size:0.9rem;">Upload CAD Data</div>
    <div style="font-size:0.65rem; color:var(--muted2);">Robust mapping for Drone CFS and Tulare formats</div>
  </div>

  <div class="controls">
    <span style="font-size:0.55rem; font-weight:800; color:var(--muted2);">SHIFT</span>
    <button class="shift-btn" data-h="8" onclick="setShift(8)">8H</button>
    <button class="shift-btn active" data-h="10" onclick="setShift(10)">10H</button>
    <button class="shift-btn" data-h="12" onclick="setShift(12)">12H</button>
    <div style="width:1px; height:18px; background:#333; margin:0 8px;"></div>
    <select id="minPriority" onchange="generate()" style="background:#111; color:#fff; border:1px solid #333; padding:4px; border-radius:4px; font-size:0.7rem;">
      <option value="1">Priority 1</option>
      <option value="2" selected>Priority 1 & 2</option>
      <option value="99">All Volume</option>
    </select>
    <button class="btn-generate" id="btnGenerate" onclick="generate()" disabled>Optimize Schedule</button>
  </div>

  <div id="statusBar" class="status-bar hidden"></div>

  <div id="mainContent" class="hidden">
    <div class="dashboard-grid">
      <div class="main-stats">
        <div class="kpi-row" id="kpiRow"></div>
        <div class="chart-card">
          <div class="chart-title">Hourly Demand Weighting</div>
          <canvas id="hourChart" height="110"></canvas>
        </div>
      </div>
      <div class="side-panel">
        <div class="chart-card" style="padding:10px;">
          <div class="chart-title" style="margin-left:10px; margin-top:5px;">Incident Pocket Map</div>
          <div id="pocketMap"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Priority Mix</div>
          <canvas id="priorityChart" height="150"></canvas>
        </div>
      </div>
    </div>

    <div class="two-col">
      <div class="chart-card">
        <div class="chart-title">Incident Type Analysis</div>
        <div class="scroll-table"><table class="sched-table" id="callTypeTable"></table></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Final Assignment Plan</div>
        <div class="scroll-table"><table class="sched-table" id="schedTable"></table></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Demand Heatmap Calendar</div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>
</div>

<script>
let parsedData = [];
let shiftHours = 10;
let charts = {};
let map = null;
let markers = [];

document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const isExcel = file.name.match(/\.(xlsx|xls)$/);
    const status = document.getElementById('statusBar');
    status.innerHTML = "Processing File...";
    status.classList.remove('hidden');

    if (isExcel) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            processData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsBinaryString(file);
    } else {
        Papa.parse(file, {header:true, dynamicTyping:true, skipEmptyLines:true, complete:(res)=>processData(res.data)});
    }
});

function processData(data) {
    const MAX_SAMPLES = 10000;
    let sampledRaw = data.length > MAX_SAMPLES ? data.slice(0, MAX_SAMPLES) : data;
    
    document.getElementById('statusBar').innerHTML = `Loaded ${data.length.toLocaleString()} records. Visualizing ${sampledRaw.length.toLocaleString()} samples.`;

    parsedData = sampledRaw.map(r => {
        const find = (tags) => {
            const keys = Object.keys(r);
            const foundKey = keys.find(key => {
                const std = key.toLowerCase().replace(/[^a-z0-9]/g,'');
                return tags.some(t => std.includes(t));
            });
            return foundKey ? r[foundKey] : null;
        };

        // Specific Mapping for "Drone CFS Data" and split date/time formats
        const d = find(['creationdate', 'date', 'receiveddate', 'calldate']);
        const t = find(['creationtime', 'time', 'calltime', 'timestamp']);
        let dt = (d && t && d !== t) ? new Date(d + ' ' + t) : (t ? new Date(t) : new Date(d));
        
        let p = find(['callpriority', 'priority', 'prio', 'level']);
        if (typeof p === 'string') p = parseInt(p.replace(/\D/g,'')) || 4;

        return {
            priority: p || 4,
            nature: find(['calltype', 'nature', 'problem', 'incidenttype', 'description']) || 'OTHER',
            hour: isNaN(dt.getHours()) ? 0 : dt.getHours(),
            dateKey: !isNaN(dt.getTime()) ? dt.toISOString().split('T')[0] : 'Unknown',
            monthGroup: !isNaN(dt.getTime()) ? dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') : 'Unknown',
            dt: dt,
            lat: parseFloat(find(['addresslatitude', 'latitude', 'lat', 'ycoordinate'])),
            lon: parseFloat(find(['addresslongitude', 'longitude', 'lon', 'xcoordinate']))
        };
    }).filter(d => !isNaN(d.dt.getTime()));

    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('mainContent').classList.remove('hidden');
    initMap();
    generate();
}

function initMap() {
    if (!map) {
        map = L.map('pocketMap', { zoomControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);
    }
    
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const validCoords = parsedData.filter(d => !isNaN(d.lat) && !isNaN(d.lon) && d.lat !== 0);
    if (validCoords.length > 0) {
        const bounds = L.latLngBounds();
        validCoords.forEach(d => {
            const m = L.circleMarker([d.lat, d.lon], {
                radius: 3,
                fillColor: d.priority <= 2 ? '#FF3B3B' : '#00D2FF',
                color: '#000',
                weight: 1,
                fillOpacity: 0.7
            });
            m.addTo(map);
            markers.push(m);
            bounds.extend([d.lat, d.lon]);
        });
        map.fitBounds(bounds, { padding: [20, 20], maxZoom: 14 });
    }
}

function generate() {
    const minP = parseInt(document.getElementById('minPriority').value);
    const hourlyScores = Array(24).fill(0);
    const priCounts = {};
    const natCounts = {};

    parsedData.forEach(d => {
        if(d.priority <= minP || minP === 99) hourlyScores[d.hour] += (11 - d.priority);
        priCounts[d.priority] = (priCounts[d.priority] || 0) + 1;
        natCounts[d.nature] = (natCounts[d.nature] || 0) + 1;
    });
    
    document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><span class="kpi-val">${parsedData.length.toLocaleString()}</span><span class="kpi-lbl">Volume</span></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--red)">${parsedData.filter(d=>d.priority<=2).length.toLocaleString()}</span><span class="kpi-lbl">P1-2</span></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--gold)">${parsedData.filter(d=>!isNaN(d.lat)).length.toLocaleString()}</span><span class="kpi-lbl">Mapped</span></div>`;

    if(charts.hr) charts.hr.destroy();
    charts.hr = new Chart(document.getElementById('hourChart'), {
        type: 'bar', data: { labels: Array.from({length:24},(_,i)=>formatHr(i)), datasets:[{data:hourlyScores, backgroundColor:'#00D2FF'}]},
        options: { plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#1a1a1a'}, ticks:{display:false}}, x:{grid:{color:'#1a1a1a'}, ticks:{color:'#666', font:{size:9}}}}}
    });

    if(charts.pri) charts.pri.destroy();
    charts.pri = new Chart(document.getElementById('priorityChart'), {
        type: 'doughnut', data: { labels: Object.keys(priCounts).map(k=>'P'+k), datasets:[{data:Object.values(priCounts), backgroundColor:['#FF3B3B','#FFD700','#00D2FF','#39FF14'], borderWidth:0}]},
        options: { plugins:{legend:{position:'bottom', labels:{color:'#888', font:{size:9}}}}, cutout:'75%'}
    });

    const sortedNat = Object.entries(natCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
    document.getElementById('callTypeTable').innerHTML = sortedNat.map(([n,c])=>`<tr><td style="font-family:'IBM Plex Mono'">${n}</td><td>${c.toLocaleString()}</td></tr>`).join('');

    const totalScore = hourlyScores.reduce((a,b)=>a+b,0);
    const numShifts = Math.floor(24 / shiftHours);
    const shifts = [];
    for(let i=0; i<numShifts; i++) {
        let bestStart = i * (24/numShifts), max = 0;
        for(let off=-3; off<=3; off++) {
            let start = (Math.floor(bestStart)+off+24)%24, s=0;
            for(let h=0; h<shiftHours; h++) s += hourlyScores[(start+h)%24];
            if(s > max) { max = s; bestStart = start; }
        }
        shifts.push({start:bestStart, end:(bestStart+shiftHours)%24, score:max});
    }
    document.getElementById('schedTable').innerHTML = shifts.map((s,i) => `<tr><td style="font-weight:700">UNIT ${i+1}</td><td style="color:var(--accent); font-weight:700;">${formatHr(s.start)} – ${formatHr(s.end)}</td><td>${((s.score/totalScore)*100).toFixed(1)}%</td></tr>`).join('');
    
    renderCalendar();
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
    const dayStats = {}; 
    parsedData.forEach(d => { if(d.dateKey !== 'Unknown') dayStats[d.dateKey] = (dayStats[d.dateKey] || 0) + 1; });
    
    const months = [...new Set(parsedData.map(d => d.monthGroup).filter(m => m !== 'Unknown'))].sort();
    months.forEach(mKey => {
        const [y, m] = mKey.split('-').map(Number);
        const monthDiv = document.createElement('div'); monthDiv.className = 'cal-month';
        monthDiv.innerHTML = `<div class="cal-title">${new Date(y, m-1).toLocaleString('default',{month:'long'})} ${y}</div>`;
        const daysDiv = document.createElement('div'); daysDiv.className = 'cal-days';
        const firstDay = new Date(y, m-1, 1).getDay();
        for(let i=0; i<firstDay; i++) daysDiv.innerHTML += `<div class="cal-day empty"></div>`;
        const lastDay = new Date(y, m, 0).getDate();
        const mMax = Math.max(...parsedData.filter(d=>d.monthGroup===mKey).map(d=>dayStats[d.dateKey] || 0), 1);

        for(let d=1; d<=lastDay; d++) {
            const k = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = dayStats[k] || 0;
            let lvl = count > 0 ? (count >= mMax * 0.8 ? "lvl-4" : "lvl-1") : "lvl-0";
            daysDiv.innerHTML += `<div class="cal-day ${lvl}" title="${count} Incidents">${d}</div>`;
        }
        monthDiv.appendChild(daysDiv); grid.appendChild(monthDiv);
    });
}

function setShift(h) { 
    shiftHours = h; 
    document.querySelectorAll('.shift-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.h) === h)); 
    if(parsedData.length) generate(); 
}
function formatHr(h) { const hr = h%24; return (hr===0?12:hr>12?hr-12:hr) + (hr<12?'AM':'PM'); }
</script>
</body>
</html>
