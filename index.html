<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRINC DFR · Universal Operator Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800;900&display=swap');
:root { --bg:#000; --bg2:#080808; --bg3:#0f0f0f; --border:#1e1e1e; --border2:#2a2a2a; --accent:#00D2FF; --gold:#FFD700; --green:#39FF14; --red:#FF3B3B; --text:#fff; --muted2:#888; --card:#0a0a0a; }
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,210,255,0.018) 39px, rgba(0,210,255,0.018) 40px), repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(0,210,255,0.018) 79px, rgba(0,210,255,0.018) 80px); }
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }
header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.drop-zone { border: 1.5px dashed var(--border2); border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; background: var(--bg2); margin-bottom: 32px; position: relative; transition: 0.2s; }
.drop-zone:hover { border-color: var(--accent); background: rgba(0,210,255,0.04); }
.file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.controls { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; padding: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
.ctrl-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--muted2); }
.shift-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted2); padding: 7px 18px; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }
.shift-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
.btn-generate { margin-left: auto; background: var(--accent); border: none; font-weight: 800; padding: 9px 24px; border-radius: 4px; cursor: pointer; }
.btn-generate:disabled { background: var(--border2); color: var(--muted2); cursor: not-allowed; }
.status-bar { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted2); margin-bottom: 20px; display:none; }
.status-bar.visible { display:block; }
.status-bar span.hi { color: var(--accent); font-weight: 600; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-top: 3px solid var(--accent); }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; color: var(--accent); font-weight: 700; display: block; margin-bottom: 4px; }
.kpi-lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--muted2); }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.chart-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--muted2); margin-bottom: 16px; }
.scroll-table { max-height: 300px; overflow-y: auto; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.sched-table th { text-align: left; padding: 8px; color: var(--muted2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; text-transform: uppercase; }
.sched-table td { padding: 11px 8px; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">BRINC <span>·</span> DFR</div>
    <div class="header-tag">DFR WORKFORCE PLANNING</div>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" class="file-input" id="fileInput" accept=".csv, .xlsx, .xls">
    <div style="font-size:2rem;">📂</div>
    <div style="font-weight:800; margin:10px 0;">Drop any CAD Export here</div>
    <div style="font-size:0.75rem; color:var(--muted2);">Robust Schema Engine for All 5 Sample Formats</div>
  </div>

  <div class="controls">
    <span class="ctrl-label">Shift Length</span>
    <button class="shift-btn" data-h="8" onclick="setShift(8)">8 hr</button>
    <button class="shift-btn active" data-h="10" onclick="setShift(10)">10 hr</button>
    <button class="shift-btn" data-h="12" onclick="setShift(12)">12 hr</button>
    <div style="width:1px; height:24px; background:var(--border2); margin: 0 10px;"></div>
    <span class="ctrl-label">Min Priority</span>
    <select id="minPriority" onchange="generate()" style="background:var(--bg3); color:#fff; border:1px solid var(--border2); padding:5px; border-radius:4px;">
      <option value="1">Priority 1</option>
      <option value="2" selected>Priority 1-2</option>
      <option value="3">Priority 1-3</option>
      <option value="99">All Priorities</option>
    </select>
    <button class="btn-generate" id="btnGenerate" onclick="generate()" disabled>Generate Schedule</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div id="mainContent" class="hidden">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Priority-Weighted Volume by Hour</div>
        <canvas id="hourChart" height="120"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Incident Distribution</div>
        <canvas id="priorityChart" height="120"></canvas>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:28px;">
        <div class="chart-title">Recommended Optimal Shifts</div>
        <table class="sched-table" id="schedTable"></table>
    </div>
  </div>
</div>

<script>
let parsedData = null;
let shiftHours = 10;
let charts = {};

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const isExcel = file.name.match(/\.(xlsx|xls)$/);
    document.getElementById('statusBar').innerHTML = "Processing...";
    document.getElementById('statusBar').classList.add('visible');

    if (isExcel) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            processCADData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsBinaryString(file);
    } else {
        Papa.parse(file, {header:true, dynamicTyping:true, skipEmptyLines:true, complete:(res)=>processCADData(res.data)});
    }
});

function processCADData(data) {
    parsedData = data.map(r => {
        // Advanced Fuzzy Mapper
        const find = (tags) => {
            const k = Object.keys(r).find(key => {
                const std = key.toLowerCase().replace(/[^a-z0-9]/g,'');
                return tags.some(t => std === t || std.includes(t));
            });
            return k ? r[k] : null;
        };

        // Date Logic (Handles split Date/Time or combined Timestamp)
        const dPart = find(['date', 'receiveddate', 'incidentdate', 'calldate', 'received']);
        const tPart = find(['time', 'calltime', 'timefirstunitassigned', 'timestamp']);
        let dt = new Date();
        
        if (dPart && tPart && dPart !== tPart) {
            dt = new Date(dPart + ' ' + tPart);
        } else if (tPart) {
            dt = new Date(tPart);
        } else if (dPart) {
            dt = new Date(dPart);
        }

        // Coordinate Logic (X=Long, Y=Lat)
        const rawX = find(['longitude', 'lon', 'xcoordinate', 'xcoord']);
        const rawY = find(['latitude', 'lat', 'ycoordinate', 'ycoord']);

        // Priority Normalization
        let p = find(['priority', 'prio', 'prioritynumber', 'level', 'severity']);
        if (typeof p === 'string') p = parseInt(p.replace(/\D/g,''));

        return {
            priority: p || 4,
            nature: find(['calltype', 'nature', 'statutetext', 'problem', 'incidenttype', 'description']) || 'OTHER',
            hour: isNaN(dt.getHours()) ? 0 : dt.getHours(),
            dt: dt,
            lat: parseFloat(rawY),
            lon: parseFloat(rawX)
        };
    }).filter(item => !isNaN(item.dt.getTime()));

    document.getElementById('btnGenerate').disabled = false;
    const locCount = parsedData.filter(d => !isNaN(d.lat) && d.lat !== 0).length;
    document.getElementById('statusBar').innerHTML = `✓ Mapped <span class="hi">${parsedData.length.toLocaleString()}</span> incidents. Geospatial Data: <span class="hi">${locCount}</span> items.`;
    renderAnalytics();
    generate();
}

function renderAnalytics() {
    const total = parsedData.length;
    const peakHour = getPeakHour();
    const p12 = parsedData.filter(d => d.priority <= 2).length;

    document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><span class="kpi-val">${total.toLocaleString()}</span><div class="kpi-lbl">Total Incidents</div></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--red)">${p12.toLocaleString()}</span><div class="kpi-lbl">Priority 1-2</div></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--gold)">${formatHour(peakHour)}</span><div class="kpi-lbl">Peak Hour</div></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--green)">100%</span><div class="kpi-lbl">Local Privacy</div></div>
        <div class="kpi-card"><span class="kpi-val">${parsedData.filter(d=>!isNaN(d.lat)).length}</span><div class="kpi-lbl">Mapped Coords</div></div>
    `;
    
    document.getElementById('mainContent').classList.remove('hidden');

    // Hour Chart
    const hrWt = Array(24).fill(0);
    parsedData.forEach(d => { hrWt[d.hour] += (11 - d.priority); });
    if(charts.hr) charts.hr.destroy();
    charts.hr = new Chart(document.getElementById('hourChart'), {
        type: 'bar',
        data: { labels: Array.from({length:24},(_,i)=>formatHour(i)), datasets:[{data:hrWt, backgroundColor:'rgba(0,210,255,0.3)', borderColor:'#00D2FF', borderWidth:1}]},
        options: { plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#1a1a1a'}}, x:{grid:{color:'#1a1a1a'}}}}
    });
}

function generate() {
    const minP = parseInt(document.getElementById('minPriority').value);
    const hourScores = Array(24).fill(0);
    parsedData.forEach(d => { if(d.priority <= minP || minP === 99) hourScores[d.hour] += (11 - d.priority); });
    
    const totalScore = hourScores.reduce((a,b)=>a+b,0);
    const numShifts = Math.floor(24 / shiftHours);
    const shifts = [];

    // Simple Optimal Window Finder
    for(let i=0; i<numShifts; i++) {
        let bestStart = i * (24/numShifts);
        let max = 0;
        for(let offset=-3; offset<=3; offset++) {
            let start = (Math.floor(bestStart)+offset+24)%24, s=0;
            for(let h=0; h<shiftHours; h++) s += hourScores[(start+h)%24];
            if(s > max) { max = s; bestStart = start; }
        }
        shifts.push({start:bestStart, end:(bestStart+shiftHours)%24, score:max});
    }

    document.getElementById('schedTable').innerHTML = `<tr><th>Shift ID</th><th>Time Window</th><th>Vol. Coverage</th></tr>` + 
        shifts.map((s,i) => `<tr><td style="font-weight:700">SHIFT ${i+1}</td><td style="color:var(--accent)">${formatHour(s.start)} – ${formatHour(s.end)}</td><td>${((s.score/totalScore)*100).toFixed(1)}%</td></tr>`).join('');
}

function setShift(h) { 
    shiftHours = h; 
    document.querySelectorAll('.shift-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.h) === h)); 
    if(parsedData) generate(); 
}
function getPeakHour() { const c=Array(24).fill(0); parsedData.forEach(r=>c[r.hour]++); return c.indexOf(Math.max(...c)); }
function formatHour(h) { const hr = ((h % 24) + 24) % 24; return `${hr===0?12:hr>12?hr-12:hr}:00 ${hr<12?'AM':'PM'}`; }
</script>
</body>
</html>
