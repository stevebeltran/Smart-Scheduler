<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRINC DFR · Universal Operator Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800;900&display=swap');
:root { --bg:#000; --bg2:#080808; --bg3:#0f0f0f; --border:#1e1e1e; --border2:#2a2a2a; --accent:#00D2FF; --gold:#FFD700; --green:#39FF14; --red:#FF3B3B; --text:#fff; --muted2:#888; --card:#0a0a0a; }
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }
header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.drop-zone { border: 1.5px dashed var(--border2); border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; background: var(--bg2); margin-bottom: 32px; position: relative; }
.drop-zone:hover { border-color: var(--accent); background: rgba(0,210,255,0.04); }
.file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.controls { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; padding: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
.ctrl-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--muted2); }
.shift-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted2); padding: 7px 18px; border-radius: 4px; cursor: pointer; }
.shift-btn.active { background: var(--accent); color: #000; }
.btn-generate { margin-left: auto; background: var(--accent); border: none; font-weight: 800; padding: 9px 24px; border-radius: 4px; cursor: pointer; }
.status-bar { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted2); margin-bottom: 20px; display:none; }
.status-bar.visible { display:block; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-top: 3px solid var(--accent); }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; color: var(--accent); font-weight: 700; }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.sched-table th { text-align: left; padding: 8px; color: var(--muted2); border-bottom: 1px solid var(--border); }
.sched-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">BRINC <span>·</span> DFR</div>
    <div class="header-tag">DFR WORKFORCE PLANNING</div>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" class="file-input" id="fileInput" accept=".csv, .xlsx, .xls">
    <div style="font-size:2rem;">📂</div>
    <div style="font-weight:800; margin:10px 0;">Drop your CAD Export here</div>
    <div style="font-size:0.75rem; color:var(--muted2);">Supports X/Y Coordinates & Received Date formats</div>
  </div>

  <div class="controls">
    <span class="ctrl-label">Shift Length</span>
    <button class="shift-btn" onclick="setShift(8)">8h</button>
    <button class="shift-btn active" onclick="setShift(10)">10h</button>
    <button class="shift-btn" onclick="setShift(12)">12h</button>
    <div style="width:1px; height:24px; background:var(--border2);"></div>
    <span class="ctrl-label">Min Priority</span>
    <select id="minPriority" onchange="generate()">
      <option value="1">Priority 1</option>
      <option value="2" selected>Priority 1-2</option>
      <option value="99">All</option>
    </select>
    <button class="btn-generate" id="btnGenerate" onclick="generate()" disabled>Generate Schedule</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div id="mainContent" class="hidden">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="charts-row">
      <div class="chart-card"><canvas id="hourChart"></canvas></div>
      <div class="chart-card"><canvas id="priorityChart"></canvas></div>
    </div>
    <div class="chart-card"><table class="sched-table" id="schedTable"></table></div>
  </div>
</div>

<script>
let parsedData = null;
let shiftHours = 10;
let charts = {};

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const isExcel = file.name.match(/\.(xlsx|xls)$/);
    if (isExcel) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            processCADData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsBinaryString(file);
    } else {
        Papa.parse(file, {header:true, dynamicTyping:true, skipEmptyLines:true, complete:(res)=>processCADData(res.data)});
    }
});

function processCADData(data) {
    parsedData = data.map(r => {
        const find = (tags) => {
            const k = Object.keys(r).find(key => tags.some(t => key.toLowerCase().replace(/[^a-z0-9]/g,'').includes(t)));
            return k ? r[k] : null;
        };

        const rawDate = find(['receiveddate', 'received', 'timestamp', 'calltime', 'entrytime', 'opendate']);
        const dt = rawDate ? new Date(rawDate) : new Date();
        
        // COORDINATE MAPPING: X is Longitude, Y is Latitude
        const rawX = find(['xcoordinate', 'xcoord', 'longitude', 'lon']);
        const rawY = find(['ycoordinate', 'ycoord', 'latitude', 'lat']);

        return {
            priority: parseInt(String(find(['priority', 'prio', 'level']) || 4).replace(/\D/g,'')) || 4,
            nature: find(['nature', 'calltype', 'incidenttype', 'problem']) || 'OTHER',
            hour: dt.getHours(),
            dt: dt,
            lat: parseFloat(rawY),
            lon: parseFloat(rawX)
        };
    }).filter(item => !isNaN(item.dt.getTime()) && item.priority > 0);

    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('statusBar').innerHTML = `✓ Mapped ${parsedData.length.toLocaleString()} calls. Location found: ${parsedData.filter(d=>!isNaN(d.lat)).length}`;
    document.getElementById('statusBar').classList.add('visible');
    renderAnalytics();
    generate();
}

function renderAnalytics() {
    const counts = Array(24).fill(0);
    parsedData.forEach(d => counts[d.hour]++);
    document.getElementById('kpiRow').innerHTML = `<div class="kpi-card"><div class="kpi-val">${parsedData.length}</div><div>Total Calls</div></div>`;
    document.getElementById('mainContent').classList.remove('hidden');
    
    if(charts.hr) charts.hr.destroy();
    charts.hr = new Chart(document.getElementById('hourChart'), {
        type: 'bar',
        data: { labels: Array.from({length:24},(_,i)=>i+":00"), datasets:[{label:'Volume', data:counts, backgroundColor:'#00D2FF'}]},
        options: { plugins: { legend: { display: false } } }
    });
}

function generate() {
    const minP = parseInt(document.getElementById('minPriority').value);
    const scores = Array(24).fill(0);
    parsedData.forEach(d => { if(d.priority <= minP || minP === 99) scores[d.hour] += (11 - d.priority); });
    
    const sched = [];
    for(let i=0; i < 24; i += (24/Math.floor(24/shiftHours))) {
        let bestStart = i, max = 0;
        for(let offset=-2; offset<=2; offset++) {
            let start = (Math.floor(i)+offset+24)%24, s=0;
            for(let h=0; h<shiftHours; h++) s += scores[(start+h)%24];
            if(s > max) { max = s; bestStart = start; }
        }
        sched.push({start:bestStart, end:(bestStart+shiftHours)%24, score:max});
    }
    
    document.getElementById('schedTable').innerHTML = `<tr><th>Shift</th><th>Coverage Window</th></tr>` + 
        sched.map((s,i) => `<tr><td>Shift ${i+1}</td><td>${s.start}:00 - ${s.end}:00</td></tr>`).join('');
}

function setShift(h) { shiftHours = h; document.querySelectorAll('.shift-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === h)); generate(); }
</script>
</body>
</html>
