<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRINC DFR · Dynamic Schedule Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800;900&display=swap');
:root { --bg:#000; --bg2:#080808; --border:#1e1e1e; --accent:#00D2FF; --gold:#FFD700; --green:#39FF14; --red:#FF3B3B; --text:#fff; --muted2:#888; --card:#0a0a0a; }
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow-x: hidden; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px; position: relative; z-index: 1; }
header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.drop-zone { border: 1.5px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; background: var(--bg2); margin-bottom: 30px; position: relative; }
.file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; padding: 15px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
.shift-btn { background: #111; border: 1px solid #333; color: var(--muted2); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }
.shift-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-generate { margin-left: auto; background: var(--accent); border: none; font-weight: 800; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; border-top: 3px solid var(--accent); }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 1.4rem; color: var(--accent); font-weight: 700; display: block; }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.sched-table th { text-align: left; padding: 10px; color: var(--muted2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; }
.sched-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }

/* Calendar Styling */
.calendar-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px; }
.cal-month { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; min-width: 240px; }
.cal-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; font-weight: 700; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; border: 1px solid transparent; }
.cal-day.empty { border: none; }
.cal-day.has-data { background: rgba(0,210,255,0.1); border-color: rgba(0,210,255,0.2); color: var(--accent); }
.cal-day.peak { background: rgba(255,59,59,0.2); border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(255,59,59,0.3); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header><div class="logo">BRINC <span>·</span> DFR</div><div style="font-size:0.7rem; font-weight:800; color:var(--accent);">DYNAMIC WORKFORCE PLANNER</div></header>

  <div class="drop-zone" id="dropZone">
    <input type="file" class="file-input" id="fileInput" accept=".csv, .xlsx, .xls">
    <div style="font-size:2rem;">📁</div>
    <div style="font-weight:800; margin:10px 0;">Upload CAD Data</div>
    <div style="font-size:0.7rem; color:var(--muted2);">X/Y Coordinate & Multi-Date Support Enabled</div>
  </div>

  <div class="controls">
    <span style="font-size:0.6rem; font-weight:800; color:var(--muted2);">SHIFT DURATION</span>
    <button class="shift-btn" onclick="setShift(8)">8H</button>
    <button class="shift-btn active" onclick="setShift(10)">10H</button>
    <button class="shift-btn" onclick="setShift(12)">12H</button>
    <div style="width:1px; height:20px; background:#333; margin:0 10px;"></div>
    <span style="font-size:0.6rem; font-weight:800; color:var(--muted2);">MIN PRIORITY</span>
    <select id="minPriority" onchange="generate()" style="background:#111; color:#fff; border:1px solid #333; padding:5px; border-radius:4px; font-size:0.8rem;">
      <option value="1">P1 Only</option>
      <option value="2" selected>P1 & P2</option>
      <option value="99">All Calls</option>
    </select>
    <button class="btn-generate" id="btnGenerate" onclick="generate()" disabled>Generate Optimizer</button>
  </div>

  <div id="mainContent" class="hidden">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="charts-row">
        <div class="chart-card"><div style="font-size:0.6rem; font-weight:800; color:var(--muted2); margin-bottom:15px;">HOURLY CALL DENSITY</div><canvas id="hourChart" height="130"></canvas></div>
        <div class="chart-card"><div style="font-size:0.6rem; font-weight:800; color:var(--muted2); margin-bottom:15px;">PRIORITY MIX</div><canvas id="priorityChart" height="130"></canvas></div>
    </div>
    <div class="chart-card" style="margin-bottom:30px;"><div style="font-size:0.6rem; font-weight:800; color:var(--muted2); margin-bottom:15px;">RECOMMENDED DYNAMIC SHIFTS</div><table class="sched-table" id="schedTable"></table></div>
    <div class="chart-card"><div style="font-size:0.6rem; font-weight:800; color:var(--muted2); margin-bottom:15px;">DYNAMIC WORK SCHEDULE CALENDAR</div><div class="calendar-grid" id="calendarGrid"></div></div>
  </div>
</div>

<script>
let parsedData = [];
let shiftHours = 10;
let charts = {};

document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const isExcel = file.name.match(/\.(xlsx|xls)$/);
    if (isExcel) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            processData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsBinaryString(file);
    } else {
        Papa.parse(file, {header:true, dynamicTyping:true, skipEmptyLines:true, complete:(res)=>processData(res.data)});
    }
});

function processData(data) {
    parsedData = data.map(r => {
        const find = (tags) => {
            const k = Object.keys(r).find(key => {
                const std = key.toLowerCase().replace(/[^a-z0-9]/g,'');
                return tags.some(t => std.includes(t));
            });
            return k ? r[k] : null;
        };

        const d = find(['date', 'receiveddate', 'calldate', 'received']);
        const t = find(['time', 'calltime', 'timestamp', 'received']);
        let dt = (d && t && d !== t) ? new Date(d + ' ' + t) : (t ? new Date(t) : new Date(d));
        
        let p = find(['priority', 'prio', 'level']);
        if (typeof p === 'string') p = parseInt(p.replace(/\D/g,''));

        return {
            priority: p || 4,
            nature: find(['nature', 'calltype', 'problem', 'statute']) || 'UNKNOWN',
            hour: dt.getHours(),
            dateKey: dt.toISOString().split('T')[0],
            monthKey: dt.getFullYear() + '-' + (dt.getMonth() + 1),
            day: dt.getDate(),
            dt: dt,
            lat: parseFloat(find(['latitude', 'lat', 'ycoordinate'])),
            lon: parseFloat(find(['longitude', 'lon', 'xcoordinate']))
        };
    }).filter(d => !isNaN(d.dt.getTime()));

    document.getElementById('btnGenerate').disabled = false;
    renderAnalytics();
    generate();
}

function renderAnalytics() {
    document.getElementById('mainContent').classList.remove('hidden');
    const total = parsedData.length;
    const p12 = parsedData.filter(d => d.priority <= 2).length;
    const mapped = parsedData.filter(d => !isNaN(d.lat)).length;

    document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><span class="kpi-val">${total}</span><span class="kpi-lbl">Total Calls</span></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--red)">${p12}</span><span class="kpi-lbl">P1-2 Critical</span></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--gold)">${mapped}</span><span class="kpi-lbl">Mapped Coords</span></div>
        <div class="kpi-card"><span class="kpi-val">${[...new Set(parsedData.map(d=>d.dateKey))].length}</span><span class="kpi-lbl">Days Analyzed</span></div>
        <div class="kpi-card"><span class="kpi-val" style="color:var(--green)">LOCAL</span><span class="kpi-lbl">Data Privacy</span></div>`;

    const hrs = Array(24).fill(0); parsedData.forEach(d => hrs[d.hour]++);
    if(charts.hr) charts.hr.destroy();
    charts.hr = new Chart(document.getElementById('hourChart'), {
        type: 'bar', data: { labels: Array.from({length:24},(_,i)=>i+":00"), datasets:[{data:hrs, backgroundColor:'#00D2FF'}]},
        options: { plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#1a1a1a'}}, x:{grid:{color:'#1a1a1a'}}}}
    });
}

function generate() {
    const minP = parseInt(document.getElementById('minPriority').value);
    const hourlyScores = Array(24).fill(0);
    parsedData.forEach(d => { if(d.priority <= minP || minP === 99) hourlyScores[d.hour] += (11 - d.priority); });
    
    const totalScore = hourlyScores.reduce((a,b)=>a+b,0);
    const numShifts = Math.floor(24 / shiftHours);
    const shifts = [];

    for(let i=0; i<numShifts; i++) {
        let bestStart = i * (24/numShifts), max = 0;
        for(let off=-3; off<=3; off++) {
            let start = (Math.floor(bestStart)+off+24)%24, s=0;
            for(let h=0; h<shiftHours; h++) s += hourlyScores[(start+h)%24];
            if(s > max) { max = s; bestStart = start; }
        }
        shifts.push({start:bestStart, end:(bestStart+shiftHours)%24, score:max});
    }

    document.getElementById('schedTable').innerHTML = `<tr><th>SHIFT</th><th>WINDOW</th><th>VOLUME COVERAGE</th></tr>` + 
        shifts.map((s,i) => `<tr><td style="font-weight:700">SHIFT ${i+1}</td><td style="color:var(--accent)">${formatHr(s.start)} – ${formatHr(s.end)}</td><td>${((s.score/totalScore)*100).toFixed(1)}%</td></tr>`).join('');
    
    renderCalendar();
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
    const dayStats = {}; 
    parsedData.forEach(d => { 
        dayStats[d.dateKey] = (dayStats[d.dateKey] || 0) + 1; 
    });
    
    const months = [...new Set(parsedData.map(d => d.monthKey))].sort();
    months.forEach(mKey => {
        const [y, m] = mKey.split('-').map(Number);
        const monthDiv = document.createElement('div'); monthDiv.className = 'cal-month';
        monthDiv.innerHTML = `<div class="cal-title">${new Date(y, m-1).toLocaleString('default',{month:'long'})} ${y}</div>`;
        const daysDiv = document.createElement('div'); daysDiv.className = 'cal-days';
        
        const firstDay = new Date(y, m-1, 1).getDay();
        for(let i=0; i<firstDay; i++) daysDiv.innerHTML += `<div class="cal-day empty"></div>`;
        
        const lastDay = new Date(y, m, 0).getDate();
        const mMax = Math.max(...parsedData.filter(d=>d.monthKey===mKey).map(d=>dayStats[d.dateKey] || 0));

        for(let d=1; d<=lastDay; d++) {
            const k = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = dayStats[k] || 0;
            const isPeak = count > 0 && count >= mMax * 0.9;
            daysDiv.innerHTML += `<div class="cal-day ${count>0?'has-data':''} ${isPeak?'peak':''}">${d}</div>`;
        }
        monthDiv.appendChild(daysDiv); grid.appendChild(monthDiv);
    });
}

function setShift(h) { 
    shiftHours = h; 
    document.querySelectorAll('.shift-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === h)); 
    if(parsedData.length) generate(); 
}
function formatHr(h) { const hr = h%24; return (hr===0?12:hr>12?hr-12:hr) + (hr<12?'AM':'PM'); }
</script>
</body>
</html>
